name: CI

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Checkout agbcc compiler
        uses: actions/checkout@v4
        with:
          path: 'agbcc'
          repository: 'pret/agbcc'

      - name: Build agbcc
        run: |
          ./build.sh
          ./install.sh ../
        working-directory: ./agbcc

      - name: Build ROM
        run: |
          make -j$(nproc) all

      - name: Upload Playable ROM
        uses: actions/upload-artifact@v4
        with:
          name: pokefirered_roms
          path: "*.gba"