name: CI

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GAME_VERSION: FIRERED
      GAME_LANGUAGE: ENGLISH
      GAME_REVISION: 0
      MODERN: 0
      COMPARE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Checkout agbcc
        uses: actions/checkout@v3
        with:
          path: 'agbcc'
          repository: 'pret/agbcc'

      - name: Install binutils
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi binutils-arm-none-eabi libpng-dev

      - name: Install agbcc
        run: |
          ./build.sh
          ./install.sh ../
        working-directory: ./agbcc

      - name: Build FireRed
        run: |
          make -j$(nproc) all

      - name: Upload Playable ROM
        uses: actions/upload-artifact@v3
        with:
          name: pokefirered_roms
          path: "*.gba"